# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"
  request_endorsement_notification:
    subject: "Request Endorsement"
    success_body: "Your request for endorsement of the work %{work_link} has been submitted. Response: %{response_body}"
    failure_body: "There was an error submitting your request for endorsement of the work %{work_link}. Please try again later. Response: %{response_body}"
    queued: "Your endorsement request has been queued for processing. You will receive a notification when the request has been processed."
    fileset_missing: "The work must have at least one fileset before requesting endorsement."

  request_review_notification:
    subject: "Request Review"
    success_body: "Your request for review of the work %{work_link} has been submitted. Response: %{response_body}"
    failure_body: "There was an error submitting your request for review of the work %{work_link}. Please try again later. Response: %{response_body}"
    queued: "Your review request has been queued for processing. You will receive a notification when the request has been processed."
    fileset_missing: "The work must have at least one fileset before requesting review."