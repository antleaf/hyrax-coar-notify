# version: '3'
volumes:
  db_test:
  solr_test:
  redis_test:
  app_test:
  file_uploads_test:
  derivatives_test:
  cache_test:
  branding_test:
  downloads_test:

networks:
  internal:

services:
  solr:
    image: solr:9.10.1
    env_file: .env.test
    environment:
      - OOM=script
      - SOLR_MODULES=analysis-extras,extraction
    command:
    - sh
    - "-c"
    - "precreate-core ${SOLR_TEST_CORE} /opt/solr/solr_conf && precreate-core ${SOLR_CORE} /opt/solr/solr_conf && exec solr -f"
    networks:
      internal:
    expose:
      - ${SOLR_PORT}
    ports:
      - ${SOLR_PORT}:8983
    volumes:
      - solr_test:/var/solr
      - ./solr/conf:/opt/solr/solr_conf:rw
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null http://localhost:8983/solr/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    ulimits:
      nofile:
        soft: 65000
        hard: 65000

  appdb:
    image: postgres:17-alpine
    env_file: .env.test
    environment:
      - POSTGRES_DB=${POSTGRES_DB_APP}
      - PGPORT=${POSTGRES_PORT}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      internal:
    expose:
      - ${POSTGRES_PORT}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - db_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_APP}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  app: &app
    build:
      context: .
      args:
        RAILS_ENV: ${RAILS_ENV}
        UPLOADS_PATH: ${UPLOADS_PATH}
        DERIVATIVES_PATH: ${DERIVATIVES_PATH}
        CACHE_PATH: ${CACHE_PATH}
        FITS_PATH: ${FITS_PATH}
        FITS_VERSION: ${FITS_VERSION}
        DOWNLOAD_PATH: ${DOWNLOAD_PATH}
    env_file: .env.test
    networks:
      internal:

  web:
    <<: *app
    env_file: .env.test
    environment:
      - VIRTUAL_HOST=rdms.docker
      - VIRTUAL_PORT=${PORT}
      - RAILS_FORCE_SSL=false
    command: bash -c "/bin/docker-entrypoint_test.sh"
    depends_on:
      - appdb
      - solr
      - redis
    networks:
      internal:
        aliases:
          - web
    expose:
      - ${PORT}
    ports:
      - ${PORT}:${PORT}
    volumes:
      - file_uploads_test:${UPLOADS_PATH}
      - derivatives_test:${DERIVATIVES_PATH}
      - cache_test:${CACHE_PATH}
      - ${HOST_APP_DATA_PATH:-/data/}:/data/data
      - .:/data:cached
      - downloads_test:${DOWNLOAD_PATH}
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  workers:
    <<: *app
    env_file: .env.test
    command: bash -c "bundle install && bundle exec sidekiq"
    depends_on:
      - appdb
      - solr
      - redis
    volumes:
      - file_uploads_test:${UPLOADS_PATH}
      - derivatives_test:${DERIVATIVES_PATH}
      - cache_test:${CACHE_PATH}
      - ${HOST_APP_DATA_PATH:-/data/}:/data/data
      - .:/data:cached
      - downloads_test:${DOWNLOAD_PATH}
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8
    env_file: .env.test
    command: redis-server --appendonly yes
    networks:
      internal:
    expose:
      - ${REDIS_PORT}
    # ports:
    #   - 6380:6379
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - redis_test:/data
    logging:
      options:
        max-size: "10m"
        max-file: "3"
